services:
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: hanmitravel
    volumes:
      - db_data:/var/lib/mysql
      - ./WordPressInitDBv.6.9.1.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3307:3306"

  redis:
    image: redis:7.0
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

  web:
    build: ./API-Only
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails s -b '0.0.0.0'"
    volumes:
      - ./API-Only:/rails
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: mysql2://root:password@db/hanmitravel
      REDIS_URL: redis://redis:6379/1
      RAILS_ENV: development
      DEVISE_JWT_SECRET_KEY: ${DEVISE_JWT_SECRET_KEY:-development_jwt_secret}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-development_secret}
      CMU_UI_ORIGIN: http://localhost:3001
      RAILS_LOG_TO_STDOUT: true
    depends_on:
      - db
      - redis

  cmu_ui:
    image: nginx:alpine
    ports:
      - "3001:80"
    volumes:
      - ./CMU-UI:/usr/share/nginx/html:ro

volumes:
  db_data:
  redis_data:
