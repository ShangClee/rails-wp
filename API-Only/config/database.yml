default: &default
  adapter: mysql2
  encoding: utf8mb4
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV.fetch("DB_USERNAME", "root") %>
  password: <%= ENV.fetch("DB_PASSWORD", "password") %>
  host: <%= ENV.fetch("DB_HOST", "db") %>

development:
  <<: *default
  database: hanmitravel

test:
  <<: *default
  database: hanmitravel_test

production:
  primary: &primary_production
    <<: *default
    database: hanmitravel_production
    username: hanmitravel
    password: <%= ENV["HANMITRAVEL_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: hanmitravel_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: hanmitravel_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: hanmitravel_production_cable
    migrations_paths: db/cable_migrate
