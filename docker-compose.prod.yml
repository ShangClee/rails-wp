services:
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: hanmitravel
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:7.0
    restart: always
    volumes:
      - redis_data:/data

  web:
    build: ./API-Only
    restart: always
    environment:
      RAILS_ENV: production
      DATABASE_URL: mysql2://root:${MYSQL_ROOT_PASSWORD}@db/hanmitravel
      REDIS_URL: redis://redis:6379/1
      RAILS_LOG_TO_STDOUT: true
      RAILS_SERVE_STATIC_FILES: true
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      DEVISE_JWT_SECRET_KEY: ${DEVISE_JWT_SECRET_KEY}
      CMU_UI_ORIGIN: ${CMU_UI_ORIGIN}
    depends_on:
      - db
      - redis

  cmu_ui:
    image: nginx:alpine
    restart: always
    volumes:
      - ./CMU-UI:/usr/share/nginx/html:ro

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - cmu_ui

volumes:
  db_data:
  redis_data:
