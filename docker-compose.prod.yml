services:
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: hanmitravel
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:7.0
    restart: always
    volumes:
      - redis_data:/data

  backwp:
    build: ./backWP
    command: bundle exec rails s -b '0.0.0.0'
    environment:
      DATABASE_URL: mysql2://root:password@db/wpress691
      REDIS_URL: redis://redis:6379/1
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: true
      CMU_UI_ORIGIN: http://localhost:8080
    depends_on:
      - db
      - redis
    ports:
      - "8888:3000"

  frontwp:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./frontWP:/usr/share/nginx/html:ro

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - cmu_ui

volumes:
  db_data:
  redis_data:
