server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.htm index.html;

    # Redirect /adminWP to /adminWP/ (with proper port handling)
    location = /adminWP {
        return 301 $scheme://$http_host/adminWP/;
    }

    # Serve /adminWP as SPA (hash routing)
    location /adminWP/ {
        try_files $uri $uri/ /adminWP/index.htm;
        add_header Cache-Control "public, max-age=3600";
    }

    # Serve other static files
    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "public, max-age=3600";
    }

    # Disable caching for HTML
    location ~ \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
