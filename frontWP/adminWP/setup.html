<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WordPress Setup</title>
    <!-- Assuming Tailwind CSS is available at this path -->
    <link href="/assets/styles/application.tailwind.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center font-sans">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h1 class="text-2xl font-bold mb-6 text-center text-gray-800">WordPress Installation</h1>
        
        <div id="loading" class="text-center py-4">
            <p class="text-gray-600 animate-pulse">Checking installation status...</p>
        </div>

        <div id="installed" class="hidden text-center py-4">
            <p class="text-green-600 font-medium mb-4 text-lg">WordPress is already installed.</p>
            <a href="/" class="inline-block bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700 transition duration-150 ease-in-out">Go to Home</a>
        </div>

        <form id="setup-form" class="hidden space-y-4">
            <div>
                <label for="title" class="block text-sm font-medium text-gray-700 mb-1">Site Title</label>
                <input type="text" id="title" name="title" required 
                    class="block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 border p-2 text-gray-900"
                    placeholder="My Awesome Site">
            </div>

            <div>
                <label for="url" class="block text-sm font-medium text-gray-700 mb-1">Site URL</label>
                <input type="url" id="url" name="url" required value="http://localhost:8080" 
                    class="block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 border p-2 text-gray-900">
            </div>

            <div class="border-t border-gray-200 pt-4 mt-4">
                <h2 class="text-lg font-medium text-gray-900 mb-3">Admin Account</h2>
                
                <div class="space-y-4">
                    <div>
                        <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                        <input type="text" id="username" name="username" required 
                            class="block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 border p-2 text-gray-900">
                    </div>

                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                        <input type="password" id="password" name="password" required 
                            class="block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 border p-2 text-gray-900">
                    </div>

                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Your Email</label>
                        <input type="email" id="email" name="email" required 
                            class="block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 border p-2 text-gray-900">
                    </div>
                </div>
            </div>

            <div class="pt-4">
                <button type="submit" class="w-full bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 font-medium transition duration-150 ease-in-out focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                    Install WordPress
                </button>
            </div>
            
            <div id="error-message" class="hidden bg-red-50 border-l-4 border-red-500 p-4 mt-4">
                <div class="flex">
                    <div class="flex-shrink-0">
                        <!-- Heroicon name: solid/exclamation -->
                        <svg class="h-5 w-5 text-red-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                            <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
                        </svg>
                    </div>
                    <div class="ml-3">
                        <p class="text-sm text-red-700" id="error-text"></p>
                    </div>
                </div>
            </div>
        </form>
    </div>

    <script>
        const API_URL = 'http://localhost:8888/api/v2';
        
        async function checkStatus() {
            try {
                const response = await fetch(`${API_URL}/setup`);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                
                document.getElementById('loading').classList.add('hidden');
                
                if (data.status === 'installed') {
                    document.getElementById('installed').classList.remove('hidden');
                } else {
                    document.getElementById('setup-form').classList.remove('hidden');
                }
            } catch (error) {
                console.error('Error checking status:', error);
                document.getElementById('loading').innerHTML = `
                    <div class="bg-red-50 border-l-4 border-red-500 p-4">
                        <p class="text-red-700 font-medium">Error connecting to server.</p>
                        <p class="text-red-600 text-sm mt-1">Please ensure the backend is running at ${API_URL}.</p>
                        <p class="text-xs text-gray-500 mt-2">${error.message}</p>
                    </div>
                `;
            }
        }

        document.getElementById('setup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const submitBtn = form.querySelector('button[type="submit"]');
            const errorDiv = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');
            
            const originalBtnText = submitBtn.textContent;
            submitBtn.disabled = true;
            submitBtn.textContent = 'Installing...';
            errorDiv.classList.add('hidden');

            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            try {
                const response = await fetch(`${API_URL}/setup`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data),
                });

                const result = await response.json();

                if (response.ok) {
                    alert('Installation successful! You can now login.');
                    // Redirect to home or admin login
                    window.location.href = '/'; 
                } else {
                    let errorMessage = result.error;
                    if (Array.isArray(errorMessage)) {
                        errorMessage = errorMessage.join(', ');
                    }
                    errorText.textContent = errorMessage || 'Installation failed.';
                    errorDiv.classList.remove('hidden');
                }
            } catch (error) {
                console.error('Error:', error);
                errorText.textContent = 'Network error occurred. Check console for details.';
                errorDiv.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = originalBtnText;
            }
        });

        // Initialize
        checkStatus();
    </script>
</body>
</html>
