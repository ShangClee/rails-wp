<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FrontWP Admin</title>
    <link href="/assets/styles/application.tailwind.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center font-sans">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm">
        <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Admin Login</h2>
        
        <form id="login-form" class="space-y-4">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" id="email" name="user[email]" required 
                    class="block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 border p-2 text-gray-900">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" name="user[password]" required 
                    class="block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 border p-2 text-gray-900">
            </div>

            <div class="pt-2">
                <button type="submit" class="w-full bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 font-medium transition duration-150 ease-in-out">
                    Sign In
                </button>
            </div>

            <div id="error-message" class="hidden mt-4 text-center text-sm text-red-600 font-medium">
                Invalid email or password.
            </div>
        </form>
    </div>

    <script>
        const API_URL = 'http://localhost:8888/api/v2';

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const errorDiv = document.getElementById('error-message');
            const submitBtn = form.querySelector('button');

            const originalBtnText = submitBtn.textContent;
            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing in...';
            errorDiv.classList.add('hidden');

            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            // Nested params for Devise
            const payload = {
                wp_user: {
                    email: data['user[email]'],
                    password: data['user[password]']
                }
            };

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(payload),
                });

                if (response.ok) {
                    const token = response.headers.get('Authorization');
                    if (token) {
                        localStorage.setItem('jwt_token', token);
                        window.location.href = '/adminWP/index.html';
                    } else {
                        // Fallback if token is in body (depending on Devise-JWT config)
                        const result = await response.json();
                        if (result.token) {
                             localStorage.setItem('jwt_token', result.token);
                             window.location.href = '/adminWP/index.html';
                        } else {
                            throw new Error('No token received');
                        }
                    }
                } else {
                    errorDiv.textContent = 'Invalid email or password.';
                    errorDiv.classList.remove('hidden');
                }
            } catch (error) {
                console.error('Login error:', error);
                errorDiv.textContent = 'Connection error. Please try again.';
                errorDiv.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = originalBtnText;
            }
        });
    </script>
</body>
</html>
