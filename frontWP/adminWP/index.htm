<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdminWP - Admin Console</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --text-muted: #64748b;
      --danger: #ef4444;
      --success: #22c55e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--primary);
    }

    .user-menu {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .tabs {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      display: flex;
      gap: 0;
    }

    .tab {
      padding: 0.75rem 1.5rem;
      background: none;
      border: none;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .tab:hover { color: var(--text); }
    .tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    .sub-tabs {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      display: flex;
      gap: 0;
    }

    .sub-tab {
      padding: 0.5rem 1rem;
      background: none;
      border: none;
      font-size: 0.8125rem;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s;
    }

    .sub-tab:hover { background: var(--bg); color: var(--text); }
    .sub-tab.active {
      background: var(--primary);
      color: white;
    }

    .content {
      padding: 1.5rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .toolbar h1 {
      font-size: 1.5rem;
      font-weight: 600;
    }

    .btn {
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover { background: var(--primary-hover); }

    .card {
      background: var(--surface);
      border-radius: 8px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 0.75rem 1rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    th {
      background: var(--bg);
      font-weight: 600;
      font-size: 0.8125rem;
      color: var(--text-muted);
    }

    tr:hover { background: var(--bg); }

    .badge {
      display: inline-block;
      padding: 0.25rem 0.5rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .badge-success { background: #dcfce7; color: #166534; }
    .badge-warning { background: #fef3c7; color: #92400e; }

    .skeleton {
      background: linear-gradient(90deg, var(--border) 25%, #f1f5f9 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: skeleton-loading 1.5s infinite;
      border-radius: 4px;
    }

    @keyframes skeleton-loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .toast-container {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 1000;
    }

    .toast {
      background: var(--text);
      color: white;
      padding: 0.75rem 1rem;
      border-radius: 6px;
      margin-top: 0.5rem;
      animation: toast-in 0.3s ease;
    }

    .toast.success { background: var(--success); }
    .toast.error { background: var(--danger); }

    @keyframes toast-in {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .page { display: none; }
    .page.active { display: block; }

    @media (max-width: 768px) {
      .tabs, .sub-tabs { overflow-x: auto; }
      .content { padding: 1rem; }
    }

    /* WordPress Admin Styles */
    .wp-wrap { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .wp-heading-inline { font-size: 1.5rem; font-weight: 600; margin-right: 1rem; }
    .page-title-action { 
      background: #2271b1; color: #fff; text-decoration: none; padding: 0.25rem 0.75rem; 
      border-radius: 4px; font-size: 0.875rem; border: 1px solid #2271b1; 
    }
    .page-title-action:hover { background: #1d4a7a; color: #fff; }
    
    .tablenav { clear: both; margin: 0.5rem 0 1rem; height: 32px; }
    .tablenav.top { margin-bottom: 1rem; }
    .tablenav.bottom { margin-top: 0; }
    .tablenav .actions { padding: 0; margin-bottom: 8px; }
    .tablenav .bulkactions { float: left; }
    .tablenav select { height: 28px; font-size: 14px; margin-right: 8px; }
    .tablenav .btn { height: 28px; padding: 0 12px; font-size: 13px; }
    
    .tablenav-pages { float: right; font-size: 13px; }
    .tablenav-pages .displaying-num { margin-right: 1rem; color: #646970; }
    .tablenav-pages .pagination-links { white-space: nowrap; }
    .tablenav-pages .btn { min-width: 24px; padding: 0 6px; font-size: 13px; }
    .tablenav-pages .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .tablenav-pages .paging-input { margin: 0 1rem; }
    .tablenav-pages .current-page { width: 50px; text-align: center; }
    
    .search-box { float: right; clear: right; margin-bottom: 8px; }
    .search-box input { height: 28px; font-size: 14px; padding: 0 8px; border: 1px solid #8c8f94; border-radius: 4px; margin-right: 4px; }
    .search-box .btn { height: 28px; }
    
    .wp-list-table { border-collapse: collapse; width: 100%; margin: 0 -1px; }
    .wp-list-table th, .wp-list-table td { padding: 8px 12px; border: 1px solid #dcdcde; }
    .wp-list-table td { background: #fff; }
    .wp-list-table tr:hover td { background: #f6f7f7; }
    .wp-list-table .column-cb { width: 32px; text-align: center; }
    .wp-list-table .column-title { width: 35%; }
    .wp-list-table .column-author { width: 15%; }
    .wp-list-table .column-categories, .wp-list-table .column-tags { width: 15%; }
    .wp-list-table .column-comments { width: 8%; text-align: center; }
    .wp-list-table .column-date { width: 12%; }
    .wp-list-table .check-column input { margin: 0; }
    
    .wp-list-table .has-row-actions { position: relative; }
    .wp-list-table .row-actions { 
      font-size: 12px; color: #646970; padding: 2px 0 0; 
    }
    .wp-list-table .row-title { color: #1d2327; font-weight: 600; text-decoration: none; }
    .wp-list-table .row-title:hover { color: #2271b1; }
    .wp-list-table .submitdelete { color: #b32d2d; }
    .wp-list-table .submitdelete:hover { color: #b32d2d; text-decoration: underline; }
    
    .wp-list-table .striped tbody tr:nth-child(odd) td { background: #f6f7f7; }
    .wp-list-table tfoot th { background: #f6f7f7; border-top: 1px solid #dcdcde; }
    
    .no-items td { text-align: center; color: #646970; padding: 40px; }
    
    .screen-reader-text { 
      position: absolute; left: -9999px; width: 1px; height: 1px; overflow: hidden; 
    }
    
    /* Modal Styles */
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5); z-index: 1000; display: flex; align-items: center; justify-content: center;
    }
    .modal-content {
      background: #fff; border-radius: 8px; max-width: 600px; width: 90%; max-height: 90vh; overflow-y: auto;
      box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
    }
    .modal-header { padding: 1rem 1.5rem; border-bottom: 1px solid #dcdcde; display: flex; justify-content: space-between; align-items: center; }
    .modal-header h2 { font-size: 1.25rem; font-weight: 600; }
    .modal-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #646970; }
    .modal-body { padding: 1.5rem; }
    .modal-footer { padding: 1rem 1.5rem; border-top: 1px solid #dcdcde; display: flex; justify-content: flex-end; gap: 0.5rem; }
    
    /* Form Styles */
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 0.25rem; color: #1d2327; }
    .form-control { width: 100%; padding: 8px 12px; border: 1px solid #8c8f94; border-radius: 4px; font-size: 14px; }
    .form-control:focus { border-color: #2271b1; box-shadow: 0 0 0 1px #2271b1; outline: none; }
    .large-text { font-size: 1.25rem; font-weight: 600; padding: 8px 12px; }
    .widefat { width: 100%; }
    
    .description { font-size: 12px; color: #646970; margin-top: 4px; }
    
    /* WordPress Editor */
    .wp-editor-container { border: 1px solid #dcdcde; border-radius: 4px; }
    .post-title-row { padding: 16px; border-bottom: 1px solid #dcdcde; background: #f6f7f7; }
    .post-content-row { padding: 16px; }
    .wp-editor-area { width: 100%; min-height: 300px; font-family: -apple-system, sans-serif; font-size: 14px; line-height: 1.6; }
    .post-excerpt-row, .post-status-row, .post-categories-tags-row { padding: 16px; border-top: 1px solid #dcdcde; }
    .post-status-row fieldset { border: none; padding: 0; margin: 0; }
    .submit-row { padding: 16px; border-top: 1px solid #dcdcde; display: flex; justify-content: space-between; background: #f6f7f7; }
    
    .categories-box, .tags-box { margin-bottom: 1rem; }
    .category-list, .tag-cloud { margin-top: 0.5rem; }
    
    /* Comments subsubsub tabs */
    .subsubsub { margin: 0.5rem 0 1rem; font-size: 13px; color: #646970; }
    .subsubsub a { color: #2271b1; text-decoration: none; }
    .subsubsub a:hover { color: #135e96; text-decoration: underline; }
    .subsubsub a.current { color: #1d2327; font-weight: 600; }
    .comment-status-link { cursor: pointer; }
    .wp-list-table .column-author { width: 18%; }
    .wp-list-table .column-comment { width: 45%; }
    .wp-list-table .column-response { width: 22%; }
    .wp-list-table .column-date { width: 15%; }

    /* Confirm Dialog */
    .confirm-dialog {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5); z-index: 1100; display: flex; align-items: center; justify-content: center;
    }
    .confirm-box {
      background: #fff; border-radius: 8px; padding: 24px; max-width: 400px; text-align: center;
    }
    .confirm-box p { margin-bottom: 16px; font-size: 14px; }
    .confirm-box .btn { margin: 0 4px; }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">AdminWP</div>
    <div class="user-menu">
      <button class="btn" onclick="runTests()">Test</button>
      <span id="userDisplay">Admin</span>
      <button class="btn" onclick="logout()">Logout</button>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="cms">CMS</button>
    <button class="tab" data-tab="system">System</button>
  </nav>

  <nav class="sub-tabs" id="cmsSubTabs">
    <button class="sub-tab active" data-page="cms/posts">Posts</button>
    <button class="sub-tab" data-page="cms/pages">Pages</button>
    <button class="sub-tab" data-page="cms/media">Media</button>
    <button class="sub-tab" data-page="cms/comments">Comments</button>
    <button class="sub-tab" data-page="cms/menus">Menus</button>
  </nav>

  <nav class="sub-tabs" id="systemSubTabs" style="display:none">
    <button class="sub-tab" data-page="system/setup">Setup</button>
    <button class="sub-tab" data-page="system/users">Users</button>
    <button class="sub-tab" data-page="system/roles">Roles</button>
    <button class="sub-tab" data-page="system/tokens">Tokens</button>
    <button class="sub-tab" data-page="system/health">Health</button>
    <button class="sub-tab" data-page="system/settings">Settings</button>
  </nav>

  <main class="content" id="content">
  </main>

  <div class="toast-container" id="toastContainer"></div>

  <script type="module" src="/adminWP/shared/js/admin-shell.js"></script>
</body>
</html>
