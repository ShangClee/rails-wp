<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdminWP - Admin Console</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --text-muted: #64748b;
      --danger: #ef4444;
      --success: #22c55e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--primary);
    }

    .user-menu {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .tabs {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      display: flex;
      gap: 0;
    }

    .tab {
      padding: 0.75rem 1.5rem;
      background: none;
      border: none;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .tab:hover { color: var(--text); }
    .tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    .sub-tabs {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      display: flex;
      gap: 0;
    }

    .sub-tab {
      padding: 0.5rem 1rem;
      background: none;
      border: none;
      font-size: 0.8125rem;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s;
    }

    .sub-tab:hover { background: var(--bg); color: var(--text); }
    .sub-tab.active {
      background: var(--primary);
      color: white;
    }

    .content {
      padding: 1.5rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .toolbar h1 {
      font-size: 1.5rem;
      font-weight: 600;
    }

    .btn {
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover { background: var(--primary-hover); }

    .card {
      background: var(--surface);
      border-radius: 8px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 0.75rem 1rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    th {
      background: var(--bg);
      font-weight: 600;
      font-size: 0.8125rem;
      color: var(--text-muted);
    }

    tr:hover { background: var(--bg); }

    .badge {
      display: inline-block;
      padding: 0.25rem 0.5rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .badge-success { background: #dcfce7; color: #166534; }
    .badge-warning { background: #fef3c7; color: #92400e; }

    .skeleton {
      background: linear-gradient(90deg, var(--border) 25%, #f1f5f9 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: skeleton-loading 1.5s infinite;
      border-radius: 4px;
    }

    @keyframes skeleton-loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .toast-container {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 1000;
    }

    .toast {
      background: var(--text);
      color: white;
      padding: 0.75rem 1rem;
      border-radius: 6px;
      margin-top: 0.5rem;
      animation: toast-in 0.3s ease;
    }

    .toast.success { background: var(--success); }
    .toast.error { background: var(--danger); }

    @keyframes toast-in {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .page { display: none; }
    .page.active { display: block; }

    @media (max-width: 768px) {
      .tabs, .sub-tabs { overflow-x: auto; }
      .content { padding: 1rem; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">AdminWP</div>
    <div class="user-menu">
      <button class="btn" onclick="runTests()">Test</button>
      <span id="userDisplay">Admin</span>
      <button class="btn" onclick="logout()">Logout</button>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="cms">CMS</button>
    <button class="tab" data-tab="system">System</button>
  </nav>

  <nav class="sub-tabs" id="cmsSubTabs">
    <button class="sub-tab active" data-page="cms/posts">Posts</button>
    <button class="sub-tab" data-page="cms/pages">Pages</button>
    <button class="sub-tab" data-page="cms/media">Media</button>
    <button class="sub-tab" data-page="cms/menus">Menus</button>
  </nav>

  <nav class="sub-tabs" id="systemSubTabs" style="display:none">
    <button class="sub-tab" data-page="system/setup">Setup</button>
    <button class="sub-tab" data-page="system/users">Users</button>
    <button class="sub-tab" data-page="system/roles">Roles</button>
    <button class="sub-tab" data-page="system/tokens">Tokens</button>
    <button class="sub-tab" data-page="system/health">Health</button>
    <button class="sub-tab" data-page="system/settings">Settings</button>
  </nav>

  <main class="content" id="content">
  </main>

  <div class="toast-container" id="toastContainer"></div>

  <script type="module" src="/adminWP/shared/js/admin-shell.js"></script>
</body>
</html>
