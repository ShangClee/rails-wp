<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users - FrontWP Admin</title>
    <link href="/assets/styles/application.tailwind.css" rel="stylesheet">
    <script>
        // Simple Auth Check
        function checkAuth() {
            const token = localStorage.getItem('jwt_token');
            if (!token) {
                window.location.href = '/adminWP/login.html';
            }
            return token;
        }
    </script>
</head>
<body class="bg-gray-100 min-h-screen font-sans">
    
    <!-- Top Navigation -->
    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex">
                    <div class="flex-shrink-0 flex items-center">
                        <a href="/adminWP/index.html" class="font-bold text-xl text-blue-600">FrontWP Admin</a>
                    </div>
                    <div class="hidden sm:ml-6 sm:flex sm:space-x-8">
                        <a href="/adminWP/index.html#cms" class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">
                            CMS
                        </a>
                        <a href="/adminWP/index.html#system" class="border-blue-500 text-gray-900 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">
                            System
                        </a>
                    </div>
                </div>
                <div class="flex items-center">
                    <button onclick="logout()" class="text-gray-500 hover:text-gray-700 px-3 py-2 rounded-md text-sm font-medium">
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
        <div class="px-4 py-6 sm:px-0">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-semibold text-gray-900">Users</h1>
                <a href="#" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 text-sm font-medium">Add New</a>
            </div>

            <div class="bg-white shadow overflow-hidden sm:rounded-lg">
                <div id="loading" class="p-4 text-center text-gray-500">Loading users...</div>
                <div id="error-message" class="hidden p-4 text-center text-red-500"></div>
                
                <table class="min-w-full divide-y divide-gray-200 hidden" id="users-table">
                    <thead class="bg-gray-50">
                        <tr>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                Username
                            </th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                Email
                            </th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                Registered
                            </th>
                            <th scope="col" class="relative px-6 py-3">
                                <span class="sr-only">Edit</span>
                            </th>
                        </tr>
                    </thead>
                    <tbody id="users-list" class="bg-white divide-y divide-gray-200">
                        <!-- Users will be inserted here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8888/api/v2';

        async function fetchUsers() {
            const token = checkAuth();
            const listEl = document.getElementById('users-list');
            const tableEl = document.getElementById('users-table');
            const loadingEl = document.getElementById('loading');
            const errorEl = document.getElementById('error-message');

            listEl.innerHTML = '';
            loadingEl.classList.remove('hidden');
            tableEl.classList.add('hidden');
            errorEl.classList.add('hidden');

            try {
                const response = await fetch(`${API_URL}/users`, {
                    headers: {
                        'Authorization': token
                    }
                });

                if (!response.ok) {
                    if (response.status === 401) {
                        logout();
                        return;
                    }
                    throw new Error(`Error: ${response.status}`);
                }

                const data = await response.json();
                loadingEl.classList.add('hidden');
                tableEl.classList.remove('hidden');

                if (data.data.length === 0) {
                     listEl.innerHTML = '<tr><td colspan="4" class="px-6 py-4 text-center text-gray-500">No users found.</td></tr>';
                     return;
                }

                data.data.forEach(item => {
                    const user = item.attributes;
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="flex items-center">
                                <div class="flex-shrink-0 h-10 w-10">
                                    <img class="h-10 w-10 rounded-full" src="https://ui-avatars.com/api/?name=${user.username}&background=random" alt="">
                                </div>
                                <div class="ml-4">
                                    <div class="text-sm font-medium text-gray-900">
                                        ${user.display_name || user.username}
                                    </div>
                                    <div class="text-sm text-gray-500">
                                        ${user.username}
                                    </div>
                                </div>
                            </div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="text-sm text-gray-900">${user.email}</div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                            ${new Date(user.registered_date).toLocaleDateString()}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                            <a href="#" class="text-blue-600 hover:text-blue-900">Edit</a>
                        </td>
                    `;
                    listEl.appendChild(tr);
                });

            } catch (error) {
                console.error('Fetch error:', error);
                loadingEl.classList.add('hidden');
                errorEl.textContent = 'Failed to load users. ' + error.message;
                errorEl.classList.remove('hidden');
            }
        }

        function logout() {
            localStorage.removeItem('jwt_token');
            window.location.href = '/adminWP/login.html';
        }

        // Initialize
        fetchUsers();
    </script>
</body>
</html>
